<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabourLink | Contractor Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    {% block head %}{% endblock %}
</head>
<body class="site-body">
    <nav class="navbar navbar-expand-lg custom-navbar mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        
        <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
           <span class="me-2" style="font-size: 1.5rem;">🚧</span> 
           <span class="nav-logo-text">Labour<span class="text-accent">Link</span></span>
        </a>
        
        <div class="d-flex align-items-center">
            <div class="role-badge me-3">
                <small>Level:</small> <strong>Contractor</strong>
            </div>
            <a href="/" class="btn-logout">Logout</a>
        </div>
    </div>
</nav>

    <div class="container py-2">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer mt-auto py-4">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 LabourLink System. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
