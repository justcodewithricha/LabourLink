{% extends "base.html" %}

{% block title %}Post a New Job — LabourLink{% endblock %}

{% block content %}
<div style="max-width: 720px; margin: 0 auto;">
    <div class="ll-card" style="padding: var(--space-xl); overflow: hidden;">
        
        <div class="text-center" style="margin-bottom: var(--space-lg);">
            <div class="ll-icon-wrap" style="width: 64px; height: 64px; margin: 0 auto var(--space-md);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-tan"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            </div>
            <h2 style="font-size: var(--text-2xl); font-weight: 800; margin-bottom: 0.25rem;">Post a New Job</h2>
            <p style="font-size: var(--text-sm); color: var(--text-secondary); max-width: 500px; margin: 0 auto;">
                List your site requirements here. Contractors nationwide will be able to see this post and message you if interested.
            </p>
        </div>

        <div class="hazard-stripe"></div>

        <form method="POST" action="{{ url_for('builder_post_job') }}">
            <div class="ll-field">
                <label class="ll-label" for="title">Job Title</label>
                <input type="text" class="ll-input" id="title" name="title" placeholder="e.g., Bricklaying for 10-story Residential Building" required>
            </div>

            <div class="ll-field">
                <label class="ll-label" for="description">
                    Detailed Requirements
                </label>
                <textarea class="ll-input" id="description" name="description" rows="5" maxlength="500" placeholder="Specify location, duration, number of workers required, specific skills, and budget if applicable..." oninput="document.getElementById('charCount').textContent = this.value.length + ' / 500 chars'"></textarea>
                <span class="char-counter" id="charCount">0 / 500 chars</span>
            </div>

            <div class="hazard-stripe"></div>

            <div style="display: flex; flex-direction: column; gap: var(--space-sm);">
                <button type="submit" class="ll-btn ll-btn--primary ll-btn--full" style="padding: 0.85em 1.6em;">
                    Publish Job Posting
                </button>
                <a href="{{ url_for('builder_dashboard') }}" class="ll-btn ll-btn--ghost ll-btn--full">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
