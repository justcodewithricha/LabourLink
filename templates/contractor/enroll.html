{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="fw-bold text-center mb-4">Contractor Enrollment</h2>
                <p class="text-center text-muted mb-4">Create your account to start managing your workforce digitally.</p>
                
                <form action="/contractor/enroll" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Company/Individual Name</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="e.g. Sharma Constructions" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Create a secure password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">Complete Registration</button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="/" class="text-decoration-none small">← Back to selection</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
