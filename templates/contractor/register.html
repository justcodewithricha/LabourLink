{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4">
            <h3 class="fw-bold mb-4 text-primary">Register New Worker</h3>
            <form action="/contractor/register-worker" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Aadhar Number (12 Digits)</label>
                        <input type="text" name="aadhar" class="form-control" maxlength="12" pattern="\[0-9]{12}" placeholder="123456789012" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Gender</label>
                        <select name="gender" class="form-select">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Phone Number</label>
                        <input type="tel" name="phone" class="form-control" placeholder="10-digit mobile" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">City/Location</label>
                        <input type="text" name="city" class="form-control" placeholder="e.g. Pune" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Work Specialization</label>
                    <select name="role" class="form-select">
                        <option value="Mason">Mason</option>
                        <option value="Carpenter">Carpenter</option>
                        <option value="Electrician">Electrician</option>
                        <option value="Plumber">Plumber</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">Save Worker Profile</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
